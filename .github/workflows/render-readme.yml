name: Render README + cves.yaml from cves/

on:
  push:
    branches: [main]
    paths:
      - "cves/**"
      - ".github/templates/README.template.md"
      - ".github/scripts/render_readme.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Render
        run: python .github/scripts/render_readme.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain README.md cves.yaml assets/cvss-severity.svg)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md cves.yaml assets/cvss-severity.svg
            git commit -m "docs: regenerate README + cves.yaml + severity chart from cves/ [skip ci]"
            git push
          else
            echo "README, cves.yaml and severity chart already in sync."
          fi

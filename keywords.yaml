# Keywords that trigger a candidate PR when found anywhere in a cvelistV5 record.
#
# Matching is case-insensitive substring. Edit this file to add or remove names.
# The scanner reads it on every run, so changes take effect on the next scheduled scan.
#
# Tip: keep names specific. "Smith" alone would match thousands of CVEs.
# "Jane Smith" is fine. Single-word names should be rare and distinctive
# (e.g. "Calif.io").

keywords:
  # Organizations
  - Anthropic
  - Calif.io
  - Doyensec
  - Ada Logics
  - Trail of Bits
  - Ophion Security

  # Email domains (catches credits formatted as "<user@anthropic.com>")
  - anthropic.com
  - doyensec.com

  # Researchers
  - Nicholas Carlini
  - Alex Gaynor
  - Evyatar Ben Asher
  - Keane Lucas
  - Newton Cheng
  - Daniel Freeman
  - Joel Weinberger
  - Milad Nasr
  - Adrian Denkiewicz
  - Ben Morris
  - Ziyuan Chen
  - Arthur Chan

# GitHub usernames for matching against a GHSA's structured `credits[*].user.login`.
#
# When the GHSA scanner encounters a structured credit pointing at one of
# these accounts, it treats the advisory as a hit even if the prose body
# never mentions "Anthropic". The full handle should be listed (no
# wildcards). Matching is case-insensitive. Leave the list empty to disable
# username-based matching and rely solely on the text-keyword scan above.
github_usernames:
  - agaynor
  - carlini
